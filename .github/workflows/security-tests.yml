name: Security Tests

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  backend-security-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xpensist_ci
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/xpensist_ci
      CLIENT_URL: http://localhost:5173
      ADMIN_CLIENT_URL: http://localhost:5174
      TRUST_PROXY: 1
      JWT_SECRET: ci-jwt-secret-abcdefghijklmnopqrstuvwxyz0123456789
      JWT_REFRESH_SECRET: ci-refresh-secret-abcdefghijklmnopqrstuvwxyz0123456789
      ADMIN_JWT_SECRET: ci-admin-jwt-secret-abcdefghijklmnopqrstuvwxyz012345
      ADMIN_JWT_AUDIENCE: xpensist-admin
      ADMIN_EMAILS: owner@example.com
      ADMIN_TOTP_SECRETS: owner@example.com:JBSWY3DPEHPK3PXP
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run security middleware tests
        run: npm run test:security

      - name: Run auth smoke tests
        run: npm run test:auth-smoke

  frontend-auth-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xpensist_ci
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/xpensist_ci
      CLIENT_URL: http://localhost:5173
      ADMIN_CLIENT_URL: http://localhost:5174
      TRUST_PROXY: 1
      JWT_SECRET: ci-jwt-secret-abcdefghijklmnopqrstuvwxyz0123456789
      JWT_REFRESH_SECRET: ci-refresh-secret-abcdefghijklmnopqrstuvwxyz0123456789
      ADMIN_JWT_SECRET: ci-admin-jwt-secret-abcdefghijklmnopqrstuvwxyz012345
      ADMIN_JWT_AUDIENCE: xpensist-admin
      ADMIN_EMAILS: owner@example.com
      ADMIN_TOTP_SECRETS: owner@example.com:JBSWY3DPEHPK3PXP
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Apply database migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend auth UI smoke test
        working-directory: frontend
        run: npm run test:e2e:auth
