<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xpensist Admin</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">X</div>
        <h1>Xpensist Admin</h1>
        <p>Owner access only &middot; TOTP required</p>
      </div>
      <form id="loginForm">
        <label>Email<input id="email" type="email" placeholder="owner@xpensist.com" required /></label>
        <label>Password
          <div class="input-wrap">
            <input id="password" type="password" placeholder="********" required />
            <button type="button" id="togglePassword" class="input-addon">Show</button>
          </div>
        </label>
        <label>TOTP Code<input id="totp" type="text" inputmode="numeric" maxlength="8" placeholder="123456" required /></label>
        <button class="btn primary full" type="submit" id="loginBtn">Sign In</button>
        <p id="loginError" class="error-msg"></p>
      </form>
    </div>
  </div>

  <div id="appLayout" class="app-layout hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">X</div>
        <span>Admin Panel</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-tab="overview">Overview</button>
        <button class="nav-item" data-tab="users">Users <span id="usersBadge" class="nav-badge"></span></button>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">A</div>
          <span id="adminEmail" class="sidebar-email"></span>
        </div>
        <button id="logoutBtn" class="btn-logout">Logout</button>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <div class="topbar-left">
          <h1 id="pageTitle">Overview</h1>
          <span id="lastUpdated" class="last-updated"></span>
        </div>
        <div class="topbar-right">
          <div id="connectionStatus" class="conn-status connected"><span class="conn-dot"></span> Connected</div>
          <button id="refreshBtn" class="btn-icon" title="Refresh data">?</button>
        </div>
      </header>

      <main class="content">
        <section id="overviewView" class="view">
          <div class="metrics-grid" id="metrics"></div>
          <div class="two-col-grid">
            <div class="card">
              <h3 class="card-title">Recent Signups</h3>
              <div id="recentUsers" class="recent-list"></div>
            </div>
            <div class="card">
              <h3 class="card-title">Platform Health</h3>
              <div id="healthList" class="health-list"></div>
            </div>
          </div>
        </section>

        <section id="usersView" class="view hidden">
          <div class="filter-bar card">
            <div class="filter-row">
              <div class="search-wrap">
                <input id="searchInput" type="text" placeholder="Search name, email, company..." />
              </div>
              <div class="filter-controls">
                <select id="planFilter">
                  <option value="">All Plans</option>
                  <option value="starter">Starter (Free)</option>
                  <option value="professional">Professional</option>
                  <option value="business">Business</option>
                </select>
                <select id="statusFilter">
                  <option value="">All Status</option>
                  <option value="active">Active</option>
                  <option value="trialing">Trialing</option>
                  <option value="free">Free</option>
                  <option value="suspended">Suspended</option>
                </select>
                <button id="searchBtn" class="btn primary">Search</button>
                <button id="exportBtn" class="btn">Export CSV</button>
              </div>
            </div>
          </div>

          <div class="card table-card">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>User</th>
                    <th>Plan</th>
                    <th>Status</th>
                    <th>Invoices</th>
                    <th>Period End</th>
                    <th>Joined</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="usersBody"></tbody>
              </table>
            </div>
            <div class="table-footer">
              <span id="usersMeta" class="muted"></span>
              <div class="pagination" id="pagination"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <div id="actionModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-panel card">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button class="modal-close" data-close-modal="true" aria-label="Close">&times;</button>
      </div>
      <p id="modalMessage" class="muted modal-body-text"></p>
      <div id="modalInputWrap" class="hidden modal-field">
        <label>
          <span id="modalInputLabel">Details</span>
          <input id="modalInput" type="text" />
        </label>
      </div>
      <div id="modalInputConfirmWrap" class="hidden modal-field">
        <label>
          <span id="modalInputConfirmLabel">Confirm</span>
          <input id="modalInputConfirm" type="text" />
        </label>
      </div>
      <div id="modalOutputWrap" class="hidden modal-field">
        <label>
          Output
          <div class="output-wrap">
            <input id="modalOutput" type="text" readonly />
            <button id="copyOutputBtn" class="btn" type="button">Copy</button>
          </div>
        </label>
      </div>
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn" type="button">Cancel</button>
        <button id="modalConfirmBtn" class="btn primary" type="button">Confirm</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
