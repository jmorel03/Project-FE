# Cloudflare Wrangler config (used for Cloudflare Pages environment variables)
# Not required for Pages-only deployment — use the Cloudflare dashboard instead.
# Kept here as a reference for any future Cloudflare Workers API additions.

name = "projectfe"
compatibility_date = "2024-01-01"

# ─── Pages project ───────────────────────────────────────────────────────────
# Bind to your Pages project if using wrangler pages deploy
pages_build_output_dir = "frontend/dist"

# ─── Environment variables (set via Cloudflare dashboard for security) ────────
# VITE_API_URL = "https://api.yourdomain.com/api"

# ─── Cloudflare R2 (for attachment uploads) ───────────────────────────────────
# [[r2_buckets]]
# binding = "ATTACHMENTS"
# bucket_name = "invoiceflow-attachments"

# ─── Cloudflare KV (optional: rate limiting, sessions) ───────────────────────
# [[kv_namespaces]]
# binding = "KV"
# id = "your-kv-namespace-id"
